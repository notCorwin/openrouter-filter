<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenRouter 模型筛选</title>
<style>
* { box-sizing: border-box; margin: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 24px; color: #222; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 20px; margin-bottom: 16px; }

.filters { background: #fff; border-radius: 8px; padding: 16px; display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
.filter-group label { font-size: 12px; color: #666; font-weight: 600; }
.filter-group input[type=range] { width: 140px; }
.filter-group .value { font-size: 13px; color: #333; font-family: monospace; }
.filter-group input[type=checkbox] { margin-right: 4px; }
.filter-group .checkbox-group { display: flex; gap: 6px 14px; flex-wrap: wrap; }
.filter-group .checkbox-group label { font-size: 12px; font-weight: 400; color: #333; cursor: pointer; white-space: nowrap; }

.checkbox-group .all-none { font-size: 11px; color: #888; cursor: pointer; margin-right: 8px; }
.checkbox-group .all-none:hover { color: #333; }

.params-wrap { width: 100%; }
.params-toggle { font-size: 12px; color: #666; cursor: pointer; user-select: none; padding: 2px 0; }
.params-toggle:hover { color: #333; }
.params-body { max-height: 160px; overflow-y: auto; padding: 8px 0 0 0; display: flex; gap: 6px 14px; flex-wrap: wrap; }

.stats { font-size: 13px; color: #666; margin-bottom: 8px; display: flex; gap: 16px; flex-wrap: wrap; }

table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); font-size: 13px; }
th { background: #f0f0f0; text-align: left; padding: 10px 12px; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { background: #e8e8e8; }
th .sort { margin-left: 4px; opacity: .4; }
th .sort.active { opacity: 1; color: #0066cc; }
td { padding: 8px 12px; border-top: 1px solid #eee; }
tr:hover td { background: #fafafa; }
.price { font-family: monospace; white-space: nowrap; }
.free { color: #16a34a; font-weight: 600; }
.context { font-family: monospace; }
.id-cell { font-family: monospace; font-size: 12px; color: #555; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }

.error { text-align: center; padding: 40px; color: #dc2626; }
</style>
</head>
<body>
<div class="container">
<h1>🔍 OpenRouter 模型筛选</h1>

<div class="filters">
  <div class="filter-group">
    <label>上下文</label>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="ctxMin" style="font-size:12px;padding:2px 4px;flex:1"></select>
      <span style="font-size:11px;color:#888">~</span>
      <select id="ctxMax" style="font-size:12px;padding:2px 4px;flex:1"></select>
    </div>
  </div>
  <div class="filter-group">
    <label>输入价格 ≤ $<span id="inVal">1.00</span>/1M tokens</label>
    <input type="range" id="inPrice" min="0" max="1" value="1" step="0.001">
  </div>
  <div class="filter-group">
    <label>输出价格 ≤ $<span id="outVal">1.00</span>/1M tokens</label>
    <input type="range" id="outPrice" min="0" max="1" value="1" step="0.001">
  </div>
  <div class="filter-group">
    <label>免费模型</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="showFree"> 显示免费模型</label>
    </div>
  </div>
  <div class="filter-group" style="min-width:200px;">
    <label>模态</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="inText" checked> 输入含 text</label>
      <label><input type="checkbox" id="outText" checked> 输出含 text</label>
    </div>
  </div>
  <div class="filter-group params-wrap">
    <label>支持的参数 <span id="paramCount" style="font-weight:400;color:#888;"></span></label>
    <div class="checkbox-group">
      <span class="all-none" onclick="toggleAllParams(true)">全选</span>
      <span class="all-none" onclick="toggleAllParams(false)">清空</span>
    </div>
    <div class="params-body" id="paramsBody"></div>
  </div>
</div>

<div class="stats">
  <span>匹配 <strong id="count">-</strong> 个模型</span>
  <span id="totalCount">(加载中...)</span>
</div>

<table>
<thead><tr>
  <th onclick="sortBy('name')">名称 <span class="sort" id="s-name">▲</span></th>
  <th onclick="sortBy('id')">ID <span class="sort" id="s-id">▲</span></th>
  <th onclick="sortBy('context')">上下文 <span class="sort" id="s-context">▲</span></th>
  <th onclick="sortBy('prompt')">输入价格 <span class="sort" id="s-prompt">▲</span></th>
  <th onclick="sortBy('completion')">输出价格 <span class="sort" id="s-completion">▲</span></th>
  <th onclick="sortBy('maxOutput')">Max Output <span class="sort" id="s-maxOutput">▲</span></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
let allModels = [];
let sortField = 'completion';
let sortDir = 1;

async function load() {
  try {
    const r = await fetch('https://openrouter.ai/api/v1/models');
    const j = await r.json();
    allModels = j.data || j;
    document.getElementById('totalCount').textContent = `(共 ${allModels.length} 个模型)`;
    buildContextSelects();
    buildParamCheckboxes();
    apply();
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="error">加载失败: ' + e.message + '</td></tr>';
  }
}

function buildParamCheckboxes() {
  const allParams = new Set();
  allModels.forEach(m => (m.supported_parameters || []).forEach(p => allParams.add(p)));
  const sorted = [...allParams].sort();
  const body = document.getElementById('paramsBody');
  body.innerHTML = sorted.map(p => `<label><input type="checkbox" class="param-cb" value="${esc(p)}"${p === 'tools' ? ' checked' : ''}> ${esc(p)}</label>`).join('');
  document.getElementById('paramCount').textContent = `(${sorted.length} 项)`;
  body.querySelectorAll('.param-cb').forEach(el => el.addEventListener('change', apply));
}

function toggleAllParams(checked) {
  document.querySelectorAll('.param-cb').forEach(el => { el.checked = checked; });
  apply();
}

function pricePerMillion(s) {
  if (!s.includes('.')) return parseInt(s, 10) * 1000000;
  const [int, frac] = s.split('.');
  const digits = int.replace(/^0+/, '') + frac;
  const shift = 6 - frac.length;
  if (shift >= 0) return parseInt(digits + '0'.repeat(shift), 10);
  return parseInt(digits, 10) / Math.pow(10, -shift);
}

function apply() {
  const ctxMin = +document.getElementById('ctxMin').value;
  const ctxMax = +document.getElementById('ctxMax').value;
  const inMax  = +document.getElementById('inPrice').value;
  const showFree = document.getElementById('showFree').checked;
  const outMax = +document.getElementById('outPrice').value;
  const needInText = document.getElementById('inText').checked;
  const needOutText = document.getElementById('outText').checked;

  const checkedParams = [...document.querySelectorAll('.param-cb:checked')].map(el => el.value);

  let filtered = allModels.filter(m => {
    if (m.id === 'openrouter/auto' || m.id === 'openrouter/pareto-code') return false;
    if (m.context_length < ctxMin || m.context_length > ctxMax) return false;
    const pPrompt = pricePerMillion(m.pricing.prompt);
    const pComp = pricePerMillion(m.pricing.completion);
    if (pPrompt > inMax) return false;
    if (pComp > outMax) return false;
    if (!showFree && pricePerMillion(m.pricing.prompt) === 0 && pricePerMillion(m.pricing.completion) === 0) return false;
    const inputMods = m.architecture?.input_modalities || m.input_modalities || [];
    const outputMods = m.architecture?.output_modalities || m.output_modalities || [];
    if (needInText && !inputMods.includes('text')) return false;
    if (needOutText && !outputMods.includes('text')) return false;
    // every checked param must be present in the model
    const modelParams = m.supported_parameters || [];
    for (const p of checkedParams) {
      if (!modelParams.includes(p)) return false;
    }
    return true;
  });

  document.getElementById('count').textContent = filtered.length;

  filtered.sort((a, b) => {
    let va, vb;
    switch(sortField) {
      case 'name': va = a.name; vb = b.name; break;
      case 'id': va = a.id; vb = b.id; break;
      case 'context': va = a.context_length; vb = b.context_length; break;
      case 'prompt': va = pricePerMillion(a.pricing.prompt); vb = pricePerMillion(b.pricing.prompt); break;
      case 'completion': va = pricePerMillion(a.pricing.completion); vb = pricePerMillion(b.pricing.completion); break;
      case 'maxOutput': va = a.top_provider?.max_completion_tokens || 0; vb = b.top_provider?.max_completion_tokens || 0; break;
    }
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(m => {
    const pPrompt = pricePerMillion(m.pricing.prompt);
    const pComp = pricePerMillion(m.pricing.completion);
    const promptStr = pPrompt === 0 ? '<span class="free">免费</span>' : '$' + fmtPrice(pPrompt);
    const compStr = pComp === 0 ? '<span class="free">免费</span>' : '$' + fmtPrice(pComp);
    return `<tr>
      <td>${esc(m.name)}</td>
      <td class="id-cell" title="${esc(m.id)}">${esc(m.id)}</td>
      <td class="context">${fmtCtx(m.context_length)}</td>
      <td class="price">${promptStr}</td>
      <td class="price">${compStr}</td>
      <td class="context">${fmtCtx(m.top_provider?.max_completion_tokens)}</td>
    </tr>`;
  }).join('');
}

function fmtPrice(n) {
  if (n === 0) return '0';
  let s = n.toString();
  if (/e/.test(s)) {
    const m = s.match(/e[+-](\d+)/);
    if (m) s = n.toFixed(Math.min(parseInt(m[1]) + 2, 10)).replace(/\.?0+$/, '');
  }
  return s;
}

function fmtCtx(n) {
  if (!n) return '-';
  if (n >= 1000000) {
    let s = (n / 1000000).toString();
    if (/e/.test(s)) s = (n / 1000000).toFixed(6).replace(/\.?0+$/, '');
    return s + 'M';
  }
  if (n >= 1000) {
    let s = (n / 1000).toString();
    if (/e/.test(s)) s = (n / 1000).toFixed(4).replace(/\.?0+$/, '');
    return s + 'K';
  }
  return String(n);
}

function esc(s) { return String(s).replace(/[&<>"]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }

function sortBy(field) {
  if (sortField === field) sortDir = -sortDir;
  else { sortField = field; sortDir = 1; }
  document.querySelectorAll('th .sort').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('s-' + field);
  if (el) { el.classList.add('active'); el.textContent = sortDir === 1 ? '▲' : '▼'; }
  apply();
}

function buildContextSelects() {
  const ctxSet = new Set(allModels.map(m => m.context_length).filter(Boolean));
  const ctxSorted = [...ctxSet].sort((a, b) => a - b);
  const opts = ctxSorted.map(n => `<option value="${n}">${fmtCtx(n)}</option>`).join('');
  const minSel = document.getElementById('ctxMin');
  const maxSel = document.getElementById('ctxMax');
  minSel.innerHTML = '<option value="0">不限</option>' + opts;
  maxSel.innerHTML = opts + '<option value="Infinity">不限</option>';
  // default: min=256K, max=unlimited
  const def = ctxSorted.find(n => n >= 256000) || ctxSorted[Math.floor(ctxSorted.length / 2)];
  minSel.value = def;
  maxSel.value = 'Infinity';
  minSel.addEventListener('change', apply);
  maxSel.addEventListener('change', apply);
}
document.getElementById('inPrice').addEventListener('input', function() {
  document.getElementById('inVal').textContent = parseFloat(this.value).toString();
  apply();
});
document.getElementById('outPrice').addEventListener('input', function() {
  document.getElementById('outVal').textContent = parseFloat(this.value).toString();
  apply();
});
document.querySelectorAll('#inText,#outText,#showFree').forEach(el => el.addEventListener('change', apply));

document.getElementById('s-completion').classList.add('active');
load();
</script>
</body>
</html>
